<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calendar-nav">
        <button id="prev-year">&laquo; Prev Year</button>
        <span id="current-month-year"></span>
        <button id="next-year">Next Year &raquo;</button>
    </div>
    <div class="month-column">
        <button id="prev-month" class="month-nav">&lsaquo;</button>
        <div class="month" id="month-title"></div>
        <button id="next-month" class="month-nav">&rsaquo;</button>
    </div>
    <div class="calendar-columns">
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
